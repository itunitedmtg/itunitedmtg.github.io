<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mortgage Calculator | United Mortgage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --black:#0b0b0b;
  --gray:#6b7280;
  --light:#f5f5f5;
  --white:#ffffff;
  --radius-lg:26px;
  --radius-md:16px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Inter, system-ui, Arial, sans-serif;
}

body {
  background: var(--light);
  color: var(--black);
  padding: 40px;
}

/* LAYOUT */
.calculator-wrapper {
  max-width: 1100px;
  margin: auto;
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 40px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  box-shadow: 0 20px 40px rgba(0,0,0,.08);
}

/* LEFT */
.calc-left h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

.calc-left p {
  color: var(--gray);
  margin-bottom: 30px;
}

/* INPUTS */
.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  font-size: 14px;
  margin-bottom: 6px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius-md);
  border: 1px solid #d1d5db;
  font-size: 16px;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 16px;
  border-radius: 999px;
  border: none;
  background: var(--black);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* RIGHT */
.calc-right {
  background: var(--light);
  border-radius: var(--radius-lg);
  padding: 30px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.result-box {
  text-align: center;
}

.result-box h2 {
  font-size: 22px;
  margin-bottom: 16px;
}

.result-main {
  font-size: 40px;
  font-weight: 700;
  margin-bottom: 20px;
}

.result-detail {
  font-size: 14px;
  color: var(--gray);
  margin-bottom: 8px;
}

/* RESPONSIVE */
@media(max-width:900px) {
  .calculator-wrapper {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="calculator-wrapper">

  <!-- LEFT -->
  <div class="calc-left">
    <h1>Mortgage Calculator</h1>
    <p>Estimate your monthly payment and total loan cost.</p>

    <div class="form-group">
      <label>Monto del préstamo</label>
      <input type="number" id="monto" value="200000">
    </div>

    <div class="form-group">
      <label>Tasa de interés anual (%)</label>
      <input type="number" id="tasa" step="0.01" value="4.5">
    </div>

    <div class="form-group">
      <label>Plazo (años)</label>
      <input type="number" id="plazo" value="30">
    </div>

    <div class="form-group">
      <label>Pago inicial</label>
      <input type="number" id="inicial" value="0">
    </div>

    <button onclick="calcular()">Calcular</button>
  </div>

  <!-- RIGHT -->
  <div class="calc-right">
    <div class="result-box">
      <h2>Pago mensual estimado</h2>
      <div class="result-main" id="pagoMensual">$0</div>

      <div class="result-detail" id="totalPagado">Total pagado: $0</div>
      <div class="result-detail" id="intereses">Intereses totales: $0</div>
    </div>
  </div>

</div>

<script>
function calcular() {
  let monto = parseFloat(document.getElementById('monto').value);
  let tasa = parseFloat(document.getElementById('tasa').value) / 100 / 12;
  let plazo = parseInt(document.getElementById('plazo').value) * 12;
  let inicial = parseFloat(document.getElementById('inicial').value);

  monto -= inicial;

  if (monto <= 0 || tasa <= 0 || plazo <= 0) return;

  let pagoMensual =
    monto * (tasa * Math.pow(1 + tasa, plazo)) /
    (Math.pow(1 + tasa, plazo) - 1);

  let totalPagado = pagoMensual * plazo;
  let intereses = totalPagado - monto;

  document.getElementById('pagoMensual').innerText =
    `$${pagoMensual.toFixed(2)}`;

  document.getElementById('totalPagado').innerText =
    `Total pagado: $${totalPagado.toFixed(2)}`;

  document.getElementById('intereses').innerText =
    `Intereses totales: $${intereses.toFixed(2)}`;
}
</script>

</body>
</html>
