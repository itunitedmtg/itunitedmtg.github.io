<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Branches Map | United Mortgage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CSS principal -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <!-- CSS SOLO para la página del mapa -->
  <link rel="stylesheet" href="/css/mapa.css" />
</head>

<body class="map-shell">

<!-- HEADER (moderno y consistente) -->
<header class="site-header">
  <div class="header-inner">
    <a href="/index.html" class="logo">
      <img src="/assets/unitedwithe.png" alt="United Mortgage" />
      <strong>United Mortgage</strong>
    </a>

    <nav class="nav">
      <a href="/index.html">Home</a>
      <a href="/branches.html" class="is-active">Branches</a>
      <a href="https://unitedmtg.my1003app.com/register" class="apply-btn">Apply Now</a>
    </nav>
  </div>
</header>

<main class="map-page">
  <section class="map-hero">
    <div class="container map-hero-inner">
      <div class="map-hero-text">
        <h1>Find a Branch</h1>
        <p>Search by state and click a pin to view a branch or loan officer profile.</p>
      </div>

      <div class="autocomplete">
        <input id="stateInput" placeholder="Search state (Florida, North Carolina...)" autocomplete="off" />
        <ul id="stateSuggestions" class="suggestions"></ul>
      </div>
    </div>
  </section>

  <section class="map-section">
    <div class="container">
      <div id="map" aria-label="Branches map"></div>

      <div class="map-legend">
        <div class="legend-item">
          <span class="legend-dot legend-dot--branch"></span>
          <span>Branch</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot legend-dot--person"></span>
          <span>Loan Officer</span>
        </div>
      </div>
    </div>
  </section>
</main>

<!-- Leaflet JS -->
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

<!-- Tu JS del mapa -->
<script src="js/map.js"></script>

</body>
</html>
