<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>United Mortgage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root{
      --gold:#c9a24d;
      --gold-soft:#e3c97a;
      --dark:#000;
    }

    body{
      margin:0;
      background:radial-gradient(circle at top,#111,#000);
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial, Helvetica, sans-serif;
      color:#fff;
      overflow:hidden;
    }

    /* PARTICULAS */
    .particles{
      position:absolute;
      inset:0;
      z-index:1;
      overflow:hidden;
    }

    .particle{
      position:absolute;
      width:3px;
      height:3px;
      background:var(--gold-soft);
      border-radius:50%;
      opacity:.35;
      animation: float linear infinite;
    }

    @keyframes float{
      from{transform:translateY(110vh);}
      to{transform:translateY(-10vh);}
    }

    /* CONTENIDO */
    .loader-container{
      z-index:2;
      text-align:center;
      animation: fadeIn 1.2s ease forwards;
    }

   .loader-logo{
  width:120px;
  margin-bottom:30px;

  /* 🔥 MEJORAS DE VISIBILIDAD */
  filter:
    brightness(1.25)
    contrast(1.1)
    drop-shadow(0 0 10px rgba(201,162,77,.55))
    drop-shadow(0 0 25px rgba(201,162,77,.25));

  animation: pulse 2.4s ease-in-out infinite;
}

    .loader-text{
      font-size:14px;
      letter-spacing:3px;
      color:var(--gold-soft);
      margin-bottom:22px;
    }

    .progress-bar{
      width:240px;
      height:4px;
      background:rgba(255,255,255,.15);
      border-radius:10px;
      overflow:hidden;
      margin:auto;
    }

    .progress{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,var(--gold),var(--gold-soft));
      animation: load 5s linear forwards;
    }

    @keyframes load{
      to{width:100%;}
    }

    @keyframes pulse{
      0%,100%{transform:scale(1);}
      50%{transform:scale(1.07);}
    }

    @keyframes fadeIn{
      from{opacity:0;}
      to{opacity:1;}
    }

    .fade-out{
      animation: fadeOut .9s ease forwards;
    }

    @keyframes fadeOut{
      to{
        opacity:0;
        transform:scale(1.05);
      }
    }
  </style>
</head>

<body>

  <!-- PARTICLES -->
  <div class="particles" id="particles"></div>

  <!-- LOADER -->
  <div class="loader-container" id="loader">
    <img
      src="https://img1.wsimg.com/isteam/ip/f6bd757c-6ed2-4b2b-8d79-6a09da1f70a0/PNG.png"
      alt="United Mortgage"
      class="loader-logo"
    >

    <div class="loader-text">PREPARING YOUR EXPERIENCE</div>

    <div class="progress-bar">
      <div class="progress"></div>
    </div>
  </div>

  <script>
    /* Crear partículas */
    const particlesContainer = document.getElementById('particles');
    const particleCount = 35;

    for(let i=0;i<particleCount;i++){
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random()*100 + 'vw';
      p.style.animationDuration = 8 + Math.random()*10 + 's';
      p.style.animationDelay = Math.random()*5 + 's';
      p.style.opacity = Math.random()*0.4 + 0.15;
      particlesContainer.appendChild(p);
    }

    /* Fade y redirect */
    setTimeout(()=>{
      document.getElementById('loader').classList.add('fade-out');
    },4300);

    setTimeout(()=>{
      window.location.href = "index.html";
    },5000);
  </script>

</body>
</html>
